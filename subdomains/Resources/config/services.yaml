services:
    _defaults:
        autowire: true
        autoconfigure: true

    # Bootstrap
    Plugins\Subdomains\Bootstrap:
        public: true

    # Services
    Plugins\Subdomains\Service\CloudflareService:
        public: true

    # Repositories
    Plugins\Subdomains\Entity\Repository\SubdomainRepository:
        arguments: ['@doctrine']
        tags: ['doctrine.repository_service']
        public: true

    Plugins\Subdomains\Entity\Repository\SubdomainDomainRepository:
        arguments: ['@doctrine']
        tags: ['doctrine.repository_service']
        public: true

    Plugins\Subdomains\Entity\Repository\SubdomainBlacklistRepository:
        arguments: ['@doctrine']
        tags: ['doctrine.repository_service']
        public: true

    Plugins\Subdomains\Entity\Repository\SubdomainLogRepository:
        arguments: ['@doctrine']
        tags: ['doctrine.repository_service']
        public: true

    # Client Controller
    Plugins\Subdomains\Controller\SubdomainController:
        arguments:
            $entityManager: '@doctrine.orm.entity_manager'
        tags: ['controller.service_arguments']
        public: true

    # CRUD Controllers (ALL must be registered for EasyAdmin menu linkToCrud to work)
    Plugins\Subdomains\Controller\Admin\SubdomainCrudController:
        arguments:
            $entityManager: '@doctrine.orm.entity_manager'
        tags: ['controller.service_arguments']
        public: true

    Plugins\Subdomains\Controller\Admin\DomainCrudController:
        arguments:
            $entityManager: '@doctrine.orm.entity_manager'
        tags: ['controller.service_arguments']
        public: true

    Plugins\Subdomains\Controller\Admin\SubdomainApiController:
        arguments:
            $entityManager: '@doctrine.orm.entity_manager'
        tags: ['controller.service_arguments']
        public: true

    Plugins\Subdomains\Controller\Admin\BlacklistCrudController:
        tags: ['controller.service_arguments']
        public: true

    Plugins\Subdomains\Controller\Admin\LogCrudController:
        tags: ['controller.service_arguments']
        public: true

    # Event Subscribers (auto-discovered by PluginEventSubscriberRegistry)
    Plugins\Subdomains\EventSubscriber\MenuEventSubscriber:
        public: true

    Plugins\Subdomains\EventSubscriber\ServerEventSubscriber:
        arguments:
            $entityManager: '@doctrine.orm.entity_manager'
        public: true

    Plugins\Subdomains\EventSubscriber\AddressReplacerSubscriber:
        arguments:
            $entityManager: '@doctrine.orm.entity_manager'
            $tokenStorage: '@security.token_storage'
        public: true

    # Twig Extension (provides subdomain data to templates)
    Plugins\Subdomains\Twig\SubdomainExtension:
        arguments:
            $entityManager: '@doctrine.orm.entity_manager'
        tags: ['twig.extension']
        public: true

    # Server Tab (adds "Subdomain" tab to server management page)
    Plugins\Subdomains\Tab\SubdomainTab:
        tags: ['server.tab']
        public: true

